name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - '**'

jobs:
  tests:
    name: Tests et Linting
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt

      - name: Lancer flake8
        run: flake8

      - name: Lancer les tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DEBUG: 'True'
        run: |
          pytest --cov=. --cov-fail-under=80

  docker:
    name: Build et Push Docker
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Docker
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/oc-lettings:latest
            ${{ secrets.DOCKER_USERNAME }}/oc-lettings:${{ github.sha }}

  deploy:
    name: Déploiement sur Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Déployer sur Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}